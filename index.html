<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DearTOPIK 다국어 피드백 진척</title>
<style>
  :root{ --bg:#0f1420; --card:#182031; --line:#28324a; --tx:#e8edf6; --sub:#93a1bd;
         --accent:#4f8cff; --ok:#2fd18a; --gray:#59657f; --muted:#3a465f; }
  @media (prefers-color-scheme: light){
    :root{ --bg:#f4f6fb; --card:#ffffff; --line:#e3e8f2; --tx:#1b2436; --sub:#5d6b86;
           --accent:#2e5cff; --ok:#0f9d63; --gray:#8a95ad; --muted:#cbd3e2; }
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ background:var(--bg); color:var(--tx); font-family:-apple-system,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;
        padding:26px 16px; line-height:1.5; }
  .wrap{ max-width:820px; margin:0 auto; }
  h1{ font-size:20px; font-weight:800; letter-spacing:-.02em; }
  h2{ font-size:14px; font-weight:700; margin:22px 0 10px; color:var(--tx); }
  .meta{ color:var(--sub); font-size:12.5px; margin-top:4px; }
  .goal{ display:inline-block; margin-top:8px; background:var(--line); color:var(--sub);
         border-radius:8px; padding:4px 10px; font-size:12.5px; }
  .card{ background:var(--card); border:1px solid var(--line); border-radius:14px; padding:16px 18px; }
  /* language bars */
  .lang{ display:grid; grid-template-columns:64px 1fr 118px; align-items:center; gap:12px; padding:7px 0;
         border-bottom:1px solid var(--line); }
  .lang:last-child{ border-bottom:0; }
  .lang .code{ font-weight:700; font-size:13.5px; }
  .lang .track{ height:10px; background:var(--muted); border-radius:99px; overflow:hidden; }
  .lang .track > i{ display:block; height:100%; border-radius:99px; }
  .lang .num{ text-align:right; font-size:13px; font-variant-numeric:tabular-nums; color:var(--sub); }
  .lang .num b{ color:var(--tx); }
  .ko .code{ color:var(--ok); }
  /* segment table */
  .scroll{ overflow-x:auto; -webkit-overflow-scrolling:touch; border-radius:12px; }
  table{ width:100%; border-collapse:collapse; font-size:12.5px; min-width:620px; }
  th,td{ padding:8px 8px; border-bottom:1px solid var(--line); text-align:center; white-space:nowrap; }
  th{ color:var(--sub); font-weight:600; position:sticky; top:0; background:var(--card); }
  td.l,th.l{ text-align:left; }
  td.q{ font-weight:700; font-variant-numeric:tabular-nums; }
  .full{ color:var(--ok); font-weight:700; } .zero{ color:var(--gray); } .part{ color:var(--accent); font-weight:700; }
  tr.sub td{ background:linear-gradient(0deg,transparent,transparent); }
  .grp{ text-align:left; font-weight:700; color:var(--sub); font-size:12px; padding-top:12px; }
  footer{ color:var(--sub); font-size:12px; margin-top:22px; text-align:center; }
  .chip{ display:inline-block; background:var(--line); color:var(--sub); border-radius:99px; padding:2px 9px; font-size:11.5px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>DearTOPIK 다국어 피드백 진척</h1>
  <div class="meta" id="meta">불러오는 중…</div>
  <div class="goal" id="goal"></div>

  <h2>언어별 진척</h2>
  <div class="card" id="langs"></div>

  <h2>세트별 상세 (문항수 · 언어별 완료)</h2>
  <div class="card scroll"><table id="segtbl"><thead></thead><tbody></tbody></table></div>

  <footer>
    자동 산출: <code>progress.py</code> · 분모=DB 덤프 baseline · 집계 수치만 공개(내용·프롬프트 비공개)<br>
    <span style="color:var(--accent)">*</span> 연습 세트↔DB practice 매핑 재확인 필요 · DB feedback_json은 전수 재생성 대상(로컬 기준)
    <div id="err" style="color:#e0555f;margin-top:6px"></div>
  </footer>
</div>
<script src="data.js"></script>
<script>
function render(d){
  if(!d){ document.getElementById('err').textContent='데이터 로드 실패'; return; }
  const pct=(a,b)=> b? Math.round(1000*a/b)/10 : 0;
  document.getElementById('meta').textContent='최종 갱신 '+(d.updated||'—')+' · engine '+(d.engine||'—')+' · 분모: '+(d.baseline||'DB');
  document.getElementById('goal').textContent=(d.goal_note||('목표 = 전체 '+d.total_questions.toLocaleString()));

  // 언어별 바
  document.getElementById('langs').innerHTML = d.languages.map(L=>{
    const p=pct(L.done,L.total), isko=L.code==='ko';
    return '<div class="lang'+(isko?' ko':'')+'">'
      +'<div class="code">'+L.code+'</div>'
      +'<div class="track"><i style="width:'+p+'%;background:'+(isko?'var(--ok)':'var(--accent)')+'"></i></div>'
      +'<div class="num"><b>'+L.done.toLocaleString()+'</b> / '+L.total.toLocaleString()+' · '+p+'%</div>'
      +'</div>';
  }).join('');

  // 세트별 표
  const langCodes = d.languages.filter(l=>l.code!=='ko').map(l=>l.code);
  const thead='<tr><th class="l">코퍼스</th><th class="l">구분</th><th>문항</th><th>ko</th>'
    + langCodes.map(c=>'<th>'+c+'</th>').join('') + '</tr>';
  document.querySelector('#segtbl thead').innerHTML=thead;
  const cell=(v,q)=>{ const cls = v===0?'zero':(v>=q?'full':'part'); return '<td class="'+cls+'">'+(v===0?'–':v.toLocaleString())+'</td>'; };
  let rows='', totQ=0, totKo=0; const totL={}; langCodes.forEach(c=>totL[c]=0);
  d.segments.forEach(s=>{
    totQ+=s.q; totKo+=s.ko; langCodes.forEach(c=>totL[c]+=s.langs[c]||0);
    rows+='<tr class="sub"><td class="l">'+s.corpus+'</td><td class="l">'+s.label+(s.note?' <span title="'+s.note+'" style="color:var(--accent)">*</span>':'')+'</td>'
      +'<td class="q">'+s.q.toLocaleString()+'</td>'+cell(s.ko,s.q)
      + langCodes.map(c=>cell(s.langs[c]||0,s.q)).join('') + '</tr>';
  });
  rows+='<tr style="border-top:2px solid var(--line)"><td class="l" colspan="2"><b>합계</b></td>'
    +'<td class="q">'+totQ.toLocaleString()+'</td>'+cell(totKo,totQ)
    + langCodes.map(c=>cell(totL[c],totQ)).join('')+'</tr>';
  document.querySelector('#segtbl tbody').innerHTML=rows;
}
// Pages(http): 항상 최신 progress.json fetch · file://(로컬): data.js 폴백
fetch('progress.json?t='+Date.now(),{cache:'no-store'})
  .then(function(r){ return r.json(); }).then(render)
  .catch(function(){ render(window.PROGRESS); });
</script>
</body>
</html>
