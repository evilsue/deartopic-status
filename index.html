<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DearTOPIK 다국어 진척</title>
<style>
  :root{ --bg:#0f1420; --card:#182031; --line:#28324a; --tx:#e8edf6; --sub:#93a1bd;
         --accent:#4f8cff; --ok:#2fd18a; --gray:#5a6784; }
  @media (prefers-color-scheme: light){
    :root{ --bg:#f4f6fb; --card:#ffffff; --line:#e3e8f2; --tx:#1b2436; --sub:#5d6b86;
           --accent:#2e5cff; --ok:#0f9d63; --gray:#a3adc2; }
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ background:var(--bg); color:var(--tx); font-family:-apple-system,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;
        padding:28px 18px; line-height:1.5; }
  .wrap{ max-width:760px; margin:0 auto; }
  h1{ font-size:20px; font-weight:800; letter-spacing:-.02em; }
  .meta{ color:var(--sub); font-size:12.5px; margin-top:4px; }
  .hero{ display:flex; gap:22px; align-items:center; background:var(--card); border:1px solid var(--line);
         border-radius:16px; padding:22px; margin:18px 0; flex-wrap:wrap; }
  .donut{ --p:0; width:132px; height:132px; border-radius:50%; flex:none;
          background:conic-gradient(var(--accent) calc(var(--p)*1%), var(--line) 0);
          display:grid; place-items:center; }
  .donut::before{ content:""; position:absolute; }
  .donut b{ background:var(--card); width:96px; height:96px; border-radius:50%; display:grid; place-items:center;
            flex-direction:column; text-align:center; }
  .donut .pct{ font-size:26px; font-weight:800; } .donut .cap{ font-size:11px; color:var(--sub); }
  .heronum{ flex:1; min-width:180px; }
  .heronum .big{ font-size:30px; font-weight:800; } .heronum .lbl{ color:var(--sub); font-size:13px; }
  .grid{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  @media(max-width:560px){ .grid{ grid-template-columns:1fr; } }
  .card{ background:var(--card); border:1px solid var(--line); border-radius:14px; padding:16px 18px; }
  .card .t{ font-size:13px; color:var(--sub); }
  .card .n{ font-size:22px; font-weight:800; margin-top:2px; }
  .bar{ height:8px; background:var(--line); border-radius:99px; overflow:hidden; margin-top:10px; }
  .bar > i{ display:block; height:100%; border-radius:99px; }
  table{ width:100%; border-collapse:collapse; margin-top:8px; font-size:13px; }
  th,td{ text-align:left; padding:7px 6px; border-bottom:1px solid var(--line); }
  th{ color:var(--sub); font-weight:600; } td.r{ text-align:right; font-variant-numeric:tabular-nums; }
  .sec{ margin-top:20px; }
  footer{ color:var(--sub); font-size:12px; margin-top:22px; text-align:center; }
  .chip{ display:inline-block; background:var(--line); color:var(--sub); border-radius:99px; padding:2px 9px; font-size:11.5px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>DearTOPIK 다국어 진척</h1>
  <div class="meta" id="meta">불러오는 중…</div>

  <div class="hero">
    <div class="donut" id="donut" style="position:relative"><b><span class="pct" id="opct">–</span><span class="cap">전체</span></b></div>
    <div class="heronum">
      <div class="big" id="obig">– / –</div>
      <div class="lbl">전체 문항 다국어(6언어) 완료</div>
      <div style="margin-top:10px"><span class="chip" id="engine">engine –</span></div>
    </div>
  </div>

  <div class="grid">
    <div class="card"><div class="t" id="rlbl">실기출</div><div class="n" id="rn">–</div>
      <div class="bar"><i id="rbar" style="background:var(--ok);width:0"></i></div></div>
    <div class="card"><div class="t" id="mlbl">연습기출</div><div class="n" id="mn">–</div>
      <div class="bar"><i id="mbar" style="background:var(--accent);width:0"></i></div></div>
  </div>

  <div class="sec card">
    <div class="t">연습기출 세분 (미착수 물량)</div>
    <table><thead><tr><th>레벨</th><th>영역</th><th class="r">문항</th></tr></thead>
    <tbody id="lvl"></tbody></table>
  </div>

  <footer>
    자동 산출: <code>progress.py</code> · 커밋마다 갱신 · 집계 수치만 공개(내용·프롬프트 비공개)
    <div id="err" style="color:#e0555f;margin-top:6px"></div>
  </footer>
</div>
<script src="data.js"></script>
<script>
const pct=(a,b)=> b? Math.round(1000*a/b)/10 : 0;
(function(){
  const d=window.PROGRESS;
  if(!d){ document.getElementById('err').textContent='data.js 로드 실패'; return; }
  const o=d.overall, r=d.round, m=d.mock, op=pct(o.done,o.total);
  document.getElementById('meta').textContent = '최종 갱신 '+(d.updated||'—')+' · 기준: 파일 스캔';
  document.getElementById('engine').textContent = 'engine '+(d.engine||'—');
  document.getElementById('opct').textContent = op+'%';
  document.getElementById('obig').textContent = o.done.toLocaleString()+' / '+o.total.toLocaleString();
  document.getElementById('donut').style.setProperty('--p', op);
  document.getElementById('rlbl').textContent = r.label;
  document.getElementById('rn').textContent = r.done.toLocaleString()+' / '+r.total.toLocaleString()+'  ('+pct(r.done,r.total)+'%)';
  document.getElementById('rbar').style.width = pct(r.done,r.total)+'%';
  document.getElementById('mlbl').textContent = m.label;
  document.getElementById('mn').textContent = m.done.toLocaleString()+' / '+m.total.toLocaleString()+'  ('+pct(m.done,m.total)+'%)';
  document.getElementById('mbar').style.width = pct(m.done,m.total)+'%';
  document.getElementById('lvl').innerHTML = m.by_level.map(x=>
    '<tr><td>'+x.level+'</td><td>'+x.domain+'</td><td class="r">'+x.count.toLocaleString()+'</td></tr>').join('');
})();
</script>
</body>
</html>
