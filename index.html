<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DearTOPIK 다국어 피드백 진척</title>
<style>
  :root{ --bg:#0f1420; --card:#182031; --line:#28324a; --tx:#e8edf6; --sub:#93a1bd;
         --accent:#4f8cff; --ok:#2fd18a; --warn:#f0b73f; --gray:#59657f; --muted:#3a465f; }
  @media (prefers-color-scheme: light){
    :root{ --bg:#f4f6fb; --card:#fff; --line:#e3e8f2; --tx:#1b2436; --sub:#5d6b86;
           --accent:#2e5cff; --ok:#0f9d63; --warn:#b7791f; --gray:#8a95ad; --muted:#cbd3e2; }
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ background:var(--bg); color:var(--tx); font-family:-apple-system,"Segoe UI",Roboto,"Noto Sans KR",sans-serif; padding:26px 16px; line-height:1.5; }
  .wrap{ max-width:840px; margin:0 auto; }
  h1{ font-size:20px; font-weight:800; letter-spacing:-.02em; }
  h2{ font-size:14px; font-weight:700; margin:22px 0 10px; }
  .meta{ color:var(--sub); font-size:12.5px; margin-top:4px; }
  .card{ background:var(--card); border:1px solid var(--line); border-radius:14px; padding:16px 18px; }
  .tiles{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  @media(max-width:560px){ .tiles{ grid-template-columns:1fr; } }
  .tile .t{ font-size:12.5px; color:var(--sub); }
  .tile .n{ font-size:24px; font-weight:800; margin-top:3px; }
  .tile .n small{ font-size:14px; color:var(--sub); font-weight:600; }
  .bar{ height:9px; background:var(--muted); border-radius:99px; overflow:hidden; margin-top:9px; }
  .bar > i{ display:block; height:100%; border-radius:99px; }
  .hint{ font-size:12px; color:var(--sub); margin-top:9px; }
  .scroll{ overflow-x:auto; border-radius:12px; }
  table{ width:100%; border-collapse:collapse; font-size:12.5px; min-width:640px; }
  th,td{ padding:7px 8px; border-bottom:1px solid var(--line); text-align:center; white-space:nowrap; }
  th{ color:var(--sub); font-weight:600; } td.l,th.l{ text-align:left; }
  td.q{ font-weight:700; font-variant-numeric:tabular-nums; }
  .full{ color:var(--ok); font-weight:700; } .zero{ color:var(--gray); } .part{ color:var(--accent); font-weight:700; }
  .badge{ font-size:10.5px; padding:1px 7px; border-radius:99px; font-weight:700; }
  .bY{ background:rgba(47,209,138,.16); color:var(--ok); } .bN{ background:rgba(89,101,127,.2); color:var(--sub); }
  footer{ color:var(--sub); font-size:12px; margin-top:22px; text-align:center; }
  #err{ color:#e0555f; margin-top:6px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>DearTOPIK 다국어 피드백 진척</h1>
  <div class="meta" id="meta">불러오는 중…</div>

  <h2>기출 (실기출)</h2>
  <div class="tiles">
    <div class="card tile"><div class="t">확정분 번역 (confirm=Y)</div>
      <div class="n"><span id="ec">–</span></div><div class="bar"><i id="ecb" style="background:var(--ok);width:0"></i></div>
      <div class="hint" id="ech"></div></div>
    <div class="card tile"><div class="t">전체 번역 (12회차)</div>
      <div class="n"><span id="et">–</span></div><div class="bar"><i id="etb" style="background:var(--accent);width:0"></i></div>
      <div class="hint" id="eth"></div></div>
  </div>
  <div class="card scroll" style="margin-top:14px"><table id="rtbl"><thead></thead><tbody></tbody></table></div>

  <h2>연습/모의</h2>
  <div class="card">
    <div class="tiles">
      <div class="tile"><div class="t">확정 ko 커버 (confirm=Y)</div><div class="n" id="pk">–</div>
        <div class="bar"><i id="pkb" style="background:var(--ok);width:0"></i></div><div class="hint" id="pkh"></div></div>
      <div class="tile"><div class="t">DB 전체 / mock ko</div><div class="n" id="pt">–</div><div class="hint" id="pth"></div></div>
    </div>
    <div class="hint" style="margin-top:12px;color:var(--warn)" id="pnote"></div>
  </div>
  <div class="card scroll" style="margin-top:14px"><table id="ptbl"><thead></thead><tbody></tbody></table></div>

  <footer>
    자동 산출: <code>progress.py</code> · 분모=DB 덤프(확정/전체) · 집계 수치만 공개(내용·프롬프트 비공개)<br>
    DB feedback_json은 전수 재생성 대상 → 진척은 로컬 재생성 기준
    <div id="err"></div>
  </footer>
</div>
<script src="data.js"></script>
<script>
function pct(a,b){ return b? Math.round(1000*a/b)/10 : 0; }
function render(d){
  if(!d){ document.getElementById('err').textContent='데이터 로드 실패'; return; }
  document.getElementById('meta').textContent='최종 갱신 '+(d.updated||'—')+' · engine '+(d.engine||'—')
    +' · 분모: 확정 '+d.denom.confirmed.toLocaleString()+' / 전체 '+d.denom.total.toLocaleString()+' · '+(d.baseline||'');
  var e=d.exam, p=d.practice;
  var ecDone=e.done_confirmed.en, etDone=e.done_total.en;  // 기출 ko=langs 동일
  document.getElementById('ec').innerHTML=ecDone.toLocaleString()+' <small>/ '+e.confirmed_q.toLocaleString()+' · '+pct(ecDone,e.confirmed_q)+'%</small>';
  document.getElementById('ecb').style.width=pct(ecDone,e.confirmed_q)+'%';
  document.getElementById('ech').textContent='확정 회차(83·91·96·102) 6언어 번역';
  document.getElementById('et').innerHTML=etDone.toLocaleString()+' <small>/ '+e.total_q.toLocaleString()+' · '+pct(etDone,e.total_q)+'%</small>';
  document.getElementById('etb').style.width=pct(etDone,e.total_q)+'%';
  document.getElementById('eth').textContent='미확정 8회차(1,360)는 콘텐츠 확정 대기';

  // 회차 표
  var codes=d.lang_codes;
  document.querySelector('#rtbl thead').innerHTML='<tr><th class="l">회차</th><th>확정</th><th>문항</th>'
    +'<th>ko</th>'+codes.slice(1).map(function(c){return '<th>'+c+'</th>';}).join('')+'</tr>';
  function cell(v,q){ var cls=v===0?'zero':(v>=q?'full':'part'); return '<td class="'+cls+'">'+(v===0?'–':v.toLocaleString())+'</td>'; }
  document.querySelector('#rtbl tbody').innerHTML=e.rounds.map(function(r){
    var badge=r.confirm==='Y'?'<span class="badge bY">확정</span>':'<span class="badge bN">미확정</span>';
    return '<tr><td class="l">'+r.round+'회차</td><td>'+badge+'</td><td class="q">'+r.q+'</td>'
      +cell(r.ko,r.q)+codes.slice(1).map(function(c){return cell(r.langs[c]||0,r.q);}).join('')+'</tr>';
  }).join('');

  // 연습 (복합키 정밀대조 반영)
  var cov=p.conf_covered, ct=p.confirmed_q;
  document.getElementById('pk').innerHTML=cov.toLocaleString()+' <small>/ '+ct.toLocaleString()+' · '+pct(cov,ct)+'%</small>';
  document.getElementById('pkb').style.width=pct(cov,ct)+'%';
  document.getElementById('pkh').textContent='확정 미커버 '+p.conf_uncovered+' (ko 생성 필요) · 번역 0';
  document.getElementById('pt').innerHTML=p.total_q.toLocaleString()+' <small>/ mock ko '+p.mock_ko.toLocaleString()+'</small>';
  document.getElementById('pth').textContent='mock ko 매칭 '+p.ko_matched.toLocaleString()+' · 고아 '+p.ko_orphan+'(DB에서 사라짐)';
  document.getElementById('pnote').textContent='복합키(text+선택지) 99% 유일 정밀대조 · '+p.note;

  // 연습 회차별 표
  document.querySelector('#ptbl thead').innerHTML='<tr><th class="l">연습 회차</th><th>레벨</th><th>확정</th><th>문항</th><th>ko</th><th>번역</th></tr>';
  var prows=(p.rounds||[]).map(function(r){
    var b=r.confirm==='Y'?'<span class="badge bY">확정</span>':'<span class="badge bN">'+(r.confirm==='부분'?'부분':'미확정')+'</span>';
    return '<tr><td class="l">'+r.title+'</td><td>'+r.level+'</td><td>'+b+'</td><td class="q">'+r.q+'</td>'+cell(r.ko,r.q)+cell(0,r.q)+'</tr>';
  }).join('');
  prows+='<tr style="border-top:2px solid var(--line)"><td class="l" colspan="3"><b>회차 합계</b></td><td class="q">'+p.round_q+'</td>'+cell(p.round_ko,p.round_q)+cell(0,p.round_q)+'</tr>';
  prows+='<tr><td class="l" colspan="3" style="color:var(--sub)">회차 미연결(드래프트·미확정)</td><td class="q">'+p.unlinked_q.toLocaleString()+'</td><td class="zero">–</td><td class="zero">–</td></tr>';
  document.querySelector('#ptbl tbody').innerHTML=prows;
}
fetch('progress.json?t='+Date.now(),{cache:'no-store'}).then(function(r){return r.json();}).then(render).catch(function(){ render(window.PROGRESS); });
</script>
</body>
</html>
